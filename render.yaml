services:
  - type: web
    name: signalthief-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Optional: path to Netscape cookie file on disk (e.g. bind mount / secret file).
      # Uncomment and set sync: false if you store cookies via Render secret files:
      # - key: YTDLP_COOKIES_FILE
      #   sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CACHE_MAX_AGE
        value: "3600000"
      - key: LOG_LEVEL
        value: info
    dockerfilePath: Dockerfile